domain: healthcare-claims
company: Clearview Health Plans
industry: health insurance / managed care
maturity: M
seed_quality: medium

description: |
  Clearview Health Plans is a mid-sized regional health insurer processing
  medical, institutional, and pharmacy claims for ~800K members across
  three states. The claims platform is a mix of internal microservices
  and a vendor adjudication engine currently being replaced.

key_systems:
  - claims-gateway
  - rules-engine
  - eligibility-service
  - payment-engine
  - pre-auth-service
  - fraud-detection
  - member-portal
  - provider-directory

key_processes:
  - claim-submission-and-intake
  - adjudication
  - payment-processing
  - prior-authorization
  - fraud-detection
  - member-enrollment
  - provider-credentialing

teams:
  - claims-operations
  - member-services
  - provider-network

